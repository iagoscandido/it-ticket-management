services:
  postgres:
      image: postgres:17-alpine
      restart: unless-stopped    
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: dev
        POSTGRES_PASSWORD: dev
        POSTGRES_DB: dev_db
      
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U dev -d dev_db" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

      mem_limit: 512M
      cpus: 0.5

      volumes:
        - pg_data:/var/lib/postgresql/data
        
volumes:
  pg_data: